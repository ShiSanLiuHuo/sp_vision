max_temp_lost_count: 15
outpost_max_temp_lost_count: 75
jump_z_threshold: 0.02 # m
jump_confirm_count: 2
jump_avg_alpha: 0.5
jump_fire_cooldown: 0.0 # s
jump_min_interval: 0.0 # s

#####-----aimer参数-----#####
