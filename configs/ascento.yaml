leaving_angle: 20 # degree
decision_speed: 7 # rad/s
high_speed_delay_time: 0.050 # s
low_speed_delay_time: 0.015 # s
jump_pitch_up: 0.0 # degree
jump_pitch_down: 0.0 # degree
jump_pitch_up_duration: 0.0 # s
jump_pitch_down_duration: 0.0 # s

#####-----shooter参数-----#####
