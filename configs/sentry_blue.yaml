# enemy_color: "red"
enemy_color: "blue"

#####-----神经网络参数-----#####
yolo_name: yolov5
classify_model: assets/tiny_resnet.onnx
yolo11_model_path: assets/yolo11.xml
yolov8_model_path: assets/yolov8.xml
yolov5_model_path: assets/yolov5.xml
device: CPU
min_confidence: 0.75
use_traditional: true

#####-----ROI-----#####
roi: 
  x: 240
  y: 420
  width: 800
  height: 560

use_roi: true

#####-----传统方法参数-----#####  需要修改，根据相机安装的位置
threshold: 150
max_angle_error: 45 # degree
min_lightbar_ratio: 1.5
max_lightbar_ratio: 20
min_lightbar_length: 8
min_armor_ratio: 1
max_armor_ratio: 5
max_side_ratio: 1.5
max_rectangular_error: 25 # degree

#####-----tracker参数-----#####
min_detect_count: 1
max_temp_lost_count: 3
outpost_comming_angle: 70 # degree 前哨站进入视野角度
outpost_leaving_angle: 30 # degree 前哨站离开视野角度
outpost_max_temp_lost_count: 75

#### -----装甲板跳变参数-----##### 注意要大于decision_speed才会补偿pitch角度
jump_z_threshold: 0.02 # m
jump_confirm_count: 1
jump_avg_alpha: 0.8  # 越大当前观测值比重越大，受噪声的影响越大
jump_fire_cooldown: 0.05 # s 固定延时(不使用动态参数时生效)
jump_fire_cooldown_min: 0.05 # s 低速跳变发弹延时
jump_fire_cooldown_max: 0.10 # s 高速跳变发弹延时 0.2
outpost_jump_fire_cooldown: 0.08 # s 前哨站固定跳变发弹延时(不使用动态参数时生效)
jump_fire_cooldown_speed_start: 3.0 # rad/s 低速起点
jump_fire_cooldown_speed_end: 10.0 # rad/s 高速终点
jump_pitch_up: 0.3 # degree  装甲板跳变修正量
jump_pitch_down: 1.5 # degree
jump_pitch_up_duration: 0.15 # s
jump_pitch_down_duration: 0.25 # s
jump_min_interval: 0.15 # s 跳变最小间隔
#####-----aimer参数-----#####
yaw_offset: 1.6   # degree 1.5
pitch_offset: 7.3 # degree 2
comming_angle: 50 # degree 55
leaving_angle: 10 # degree 20
comming_angle_high: 50 # degree 高速(角速度大)使用
leaving_angle_high: 10 # degree 高速(角速度大)使用
comming_end_angle: 55 # degree 极高速下的最小角度
leaving_end_angle: 8 # degree 极高速下的最小角度
speed_angle: 7 # rad/s 角速度阈值(用于comming/leaving切换)
speed_angle_max: 12 # rad/s 达到该角速度时角度缩减到end_angle
decision_speed: 7 # rad/s
high_speed_delay_time: -0.13 # s
low_speed_delay_time: -0.11 # s planner use this value

#####-----shooter参数-----#####
first_tolerance: 3 # 近距离射击容差，degree
second_tolerance: 2 # 远距离射击容差，degree
judge_distance: 2 #距离判断阈值
auto_fire: true # 是否由自瞄控制射击

camera_name: mindvision
exposure_ms: 7
gamma: 0.9
gain: 0
vid_pid: f622:d132

