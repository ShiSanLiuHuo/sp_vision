#####-----cboard参数-----#####
quaternion_canid: 0x100
bullet_speed_canid: 0x101
send_canid: 0xff
can_interface: "can0"

#####-----gimbal参数-----#####
com_port: "/dev/gimbal"
yaw_kp: 0
yaw_kd: 0
pitch_kp: 0
pitch_kd: 0

#####-----planner-----#####
fire_thresh: 0.0035
# R越大越平滑/Q越大越激进
max_yaw_acc: 50
Q_yaw: [8e3, 0] # 8e5
R_yaw: [100] # 1

max_pitch_acc: 100
Q_pitch: [9e5, 0] # 9e6
R_pitch: [100] # 1

#####-----cboard参数-----#####
phoenix_angle_unit: rad   # 下位机若发送角度(度)则设为deg，发送弧度则改为rad
imu_yaw_offset_deg: 0.0   # IMU偏置补偿，单位degree
imu_pitch_offset_deg: 0.0 # IMU偏置补偿，单位degree
use_default_bullet_speed: false # true: 始终使用yaml中的bullet_speed，false: 使用下位机弹速(无效时回退)
cboard_debug_log: true    # 排障时设true，打印原始/解析后的下位机数据

#####-----目标稳定性参数-----#####
target_jump_angle_threshold_deg: 5.0   # 判定为"大跳变"的角度阈值（度），超过此值则平滑过渡
target_stabilize_alpha: 0.3            # 平滑系数(0.0~1.0)，越小越平滑(推荐0.1~0.5)，0表示完全保持上一值，1表示完全新值
enable_target_stabilize: true          # 是否启用平滑过渡机制

#####-----buff_detector参数-----#####
model: "assets/yolo11_buff_int8.xml"

#####-----buff_aimer参数-----#####
fire_gap_time: 0.700   # s
predict_time: 0.120     # s

bullet_speed: 22.0  # m/s